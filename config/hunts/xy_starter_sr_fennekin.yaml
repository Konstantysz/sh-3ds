hunt_id: "xy_starter_sr_fennekin"
hunt_name: "Pokemon X/Y Starter Soft Reset (Fennekin)"
target_pokemon: "fennekin"
screen_mode: "dual"

# Regions of Interest (normalized 0.0-1.0, extracted on both warped screens)
rois:
  - name: "top_full"
    x: 0.05
    y: 0.05
    w: 0.9
    h: 0.9
  - name: "top_strip"
    x: 0.1
    y: 0.05
    w: 0.8
    h: 0.12
  - name: "starters_area"
    x: 0.2
    y: 0.3
    w: 0.6
    h: 0.4
  - name: "bottom_prompt"
    x: 0.20
    y: 0.30
    w: 0.60
    h: 0.28
  - name: "pokemon_sprite"
    x: 0.3
    y: 0.3
    w: 0.4
    h: 0.4
  - name: "bottom_arrow_bar"
    x: 0.0
    y: 0.9
    w: 1.0
    h: 0.1
  - name: "top_menu_bar"
    x: 0.0
    y: 0.9
    w: 1.0
    h: 0.1

# FSM state detection parameters
# intensity_event: fires on a completed Drop+Raise brightness cycle (black-screen flash)
# always_true: placeholder until R&D provides pattern recognition for this screen
debounce_frames: 1
fsm_states:
  load_game:
    top:
      roi: "top_full"
      method: "intensity_event"
      threshold: 0.5

  game_start:
    top:
      roi: "top_full"
      method: "intensity_event"
      threshold: 0.5

  cutscene_part_1:
    top:
      roi: "top_full"
      method: "intensity_event"
      threshold: 0.5

  starter_pick:
    top:
      roi: "top_full"
      method: "intensity_event"
      threshold: 0.5

  cutscene_part_2:
    top:
      roi: "top_full"
      method: "intensity_event"
      threshold: 0.5

  game_menu:
    top:
      roi: "top_menu_bar"
      method: "color_histogram"
      hsv_lower: [100, 120, 80]
      hsv_upper: [130, 255, 255]
      pixel_ratio_min: 0.7
      pixel_ratio_max: 1.0
      threshold: 0.5

  party_menu:  # TODO: replace always_true with R&D pattern recognition
    top:
      roi: "top_full"
      method: "intensity_event"
      threshold: 0.5
    bottom:
      roi: "top_full"
      method: "always_true"
      threshold: 0.5

  pokemon_summary:  # TODO: replace always_true with R&D pattern recognition
    top:
      roi: "top_full"
      method: "intensity_event"
      threshold: 0.5
    bottom:
      roi: "top_full"
      method: "always_true"
      threshold: 0.5

# Shiny detector (dominant color method)
# Based on projected hardware shift (Gamma 1.3, WB)
# Normal (Yellowish) -> Shifts to Cyan/Blue (~110)
# Shiny (Greyish/Reddish) -> Shifts further or desaturates
shiny_detector:
  method: "dominant_color"
  roi: "pokemon_sprite"
  weight: 1.0
  normal_hsv_lower: [100, 60, 150]
  normal_hsv_upper: [120, 120, 230]
  shiny_hsv_lower: [120, 40, 150]
  shiny_hsv_upper: [140, 100, 230]
  shiny_ratio_threshold: 0.15
  normal_ratio_threshold: 0.15

fusion:
  shiny_threshold: 0.55
  uncertain_threshold: 0.35

# Input actions per FSM state
actions:
  load_game:
    - buttons: ["A"]
      hold_ms: 100
      wait_after_ms: 500

  game_start:
    - buttons: ["D_LEFT"]
      hold_ms: 100
      wait_after_ms: 500

  cutscene_part_1:
    - buttons: ["A"]
      hold_ms: 100
      wait_after_ms: 100
      repeat: true

  starter_pick:
    - buttons: ["A"]
      hold_ms: 100
      wait_after_ms: 1000
    - buttons: ["A"]
      hold_ms: 100
      wait_after_ms: 1000
    - buttons: ["A"]
      hold_ms: 100
      wait_after_ms: 1000

  cutscene_part_2:
    - buttons: ["B"]
      hold_ms: 100
      wait_after_ms: 100
      repeat: true
    - buttons: ["X"]
      hold_ms: 100
      wait_after_ms: 100
      repeat: true

  game_menu:  # Tap Pokemon entry in the X menu (bottom screen, top-left area)
    - touch_x: 0.25
      touch_y: 0.2
      hold_ms: 100
      wait_after_ms: 500

  party_menu:
    - buttons: ["A"]
      hold_ms: 100
      wait_after_ms: 500
    - buttons: ["A"]
      hold_ms: 100
      wait_after_ms: 1000

  pokemon_summary:
    - buttons: ["L", "R", "START"]
      hold_ms: 500
      wait_after_ms: 2000

# Hunt behaviour
shiny_check_state: "pokemon_summary"
shiny_check_frames: 30
shiny_check_delay_ms: 1000
on_shiny_action: "stop"

recovery:
  on_stuck:
    action: "soft_reset"
    max_retries: 5
  on_detection_failure:
    action: "skip"
    max_consecutive: 10
